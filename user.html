<!DOCTYPE html>

<html>
    <head>
        <title>
            Freddyt - The horhor of the internet
        </title>
        <link rel="icon" type="images/png" href="images/freddyt_tab_icon.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Reddit+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

        <link rel="stylesheet" type="text/css" href="index.css">
        <link rel="stylesheet" type="text/css" href="user.css">
    </head>

	<!-- Copy pasted the format from bookmarks.html to have the search bar and the side nav bar . 
	Will replace with better integration in a bit . -->	

    <body>
         <header>
            <!--Show logo, doubles as link to the home page-->
            <div style="display:flex">
                <h1 id="logo"><a href="index.html" id="logo">freddyt</a></h1>

                <div id="theme-switch">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
                </div>
            </div>

            <!--The search bar-->
            <div>
                <form>
                    <input type="search" placeholder="Find anything" name="search" id="search-bar">
                </form>
            </div>

            <!--The register and log in buttons-->
            <div id="reg-login-group">
                <button id="reg">Register</button>
                <button id="log">Log In</button>
                <button id="settings-visitor"><i class='bx bx-dots-horizontal-rounded' id="settings-icon"></i></button>
            </div>

            <!--Mini profile displayed when logged in-->
            <div id="mini-profile">
                <button id="profile-clickable"><i class='bx bxs-user-circle' id="profile-icon"></i></button>
                <button id="settings-logged-in"><i class='bx bx-dots-horizontal-rounded' id="settings-icon"></i></button>
            </div>
        </header>

        <!--Side navigation bar-->
        <div class="side-nav" id="side-bar">
            <span class="nav-item" id="nav-item">
                <a href="index.html" style="text-decoration: none;"><button class="side-nav-buttons" id="home-btn"><i class='bx bxs-home' id="side-nav-icons"></i> Home</button></a>
                <div id="bookmarks-bar">
                    <a href="bookmarks.html" style="text-decoration: none;"><button class="side-nav-buttons" id="bookmarks-btn"><i class='bx bxs-bookmarks' id="side-nav-icons"></i> Bookmarks</button></a>
                </div>            
            </span>
        </div>

        <!--Menu button to close side navigation-->
        <i class="bx bx-menu" id="btn"></i>

        <!--Main content area-->
        <div id="main-content">

		<div class = "user-container">

			<div class = "user-stats">
				
				<div class = "reddit-highlights">	
					<h2>User Statistics: </h2>	
				</div>	

			<!-- something something clearing a float due to normal flow rendering of html -->		
			<br class = "clear-right">
			</div>

			<!-- one div for the whole space dedicated for viewing the user profile -->
			<div class = "user-profile-info">
					
				<!-- wrapper div dedicated for the space around the profile banner -->
				<div id = "user-banner">
					<img src = "images/sample.png">	
				</div>

				<!-- wrapper div for controlling the clickable area around the profile picture -->
				<div id = "user-pfp">	
					<img src="images/freddyt_logo.png">	
				</div>

				<!-- this is fr just for the wave -->
				<span class = "user-profile-info-bottom">
				</span>

				<div id = "user-name">
					<h1> Freddytor </h1>
				</div>		

				<!-- wrapper div for the space around the user bio -->
				<div class = "user-bio">
					<p> this is a sample description.. oooo this is really long </p>
					<button> Edit Profile </button>
				</div>

				<!-- wrapper div for the horizontal nav bar inside the user profile -->
				<div class = "user-nav-bar">
				</div>
				
				<div id = "user-content-space">

					<!--  -->>	
				</div>

			</div>

			<div id="edit-profile-popup" class="modal">
			<form id="edit-profile_form" class="edit-profile-modal">

			<div class="xcontainer">
		    <span onclick="hidePopup('edit-profile-popup')" class="close">&times;</span>
			</div>

			<div>	
				<h2>Edit Profile</h2>
				<hr>
				<br>

				<div>
					<input class="edit-pfp" type="file" id="pfp" name="edit-pfp" placeholder="Upload Image">
				</div>

				<div>
					<textarea class="edit-bio" id="bio" name="edit-bio" placeholder="Enter bio content..."></textarea>
				</div>

				<div>
					<input class="submit_btn" type="submit" value="Save Profile">
					<script src=""></script>
				</div>

			</div>
			</form>
		</div>

		</div>

		</div>	
		
        <!--Connect to JS script for animations-->
        <script src="main.js"></script>
        <script src = "darkmode.js"></script>

    </body>
</html>
