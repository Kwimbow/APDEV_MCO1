<!DOCTYPE html>
<html>
    <head>
        <title>
            Freddyt - The horhor of the internet
        </title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Reddit+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
        <link rel="stylesheet" type="text/css" href="index.css">
    </head>

    <body>
        <header>
            <div>
                <h1 id="logo"><a href="index.html" id="logo">freddyt</a></h1>
            </div>
            <div>
                <input type="search" placeholder="Find anything" name="search" id="search-bar">
            </div>
            <div>
                <a href="register.html"><button id="reg">Register</button></a>
                <a href="login.html"><button id="log">Login</button></a>
            </div>
        </header>

        <div class="side-nav" id="side-bar">
            <span class="nav-item" id="nav-item">
                <a href="index.html"><button id="side-nav-home"><i class='bx bx-home' id="side-nav-icons"></i> Home</button></a>
            </span>
            
        </div>
        <i class="bx bx-menu" id="btn"></i>
        <div id="main-content">
            <h2>Welcome to freddyt!</h2>
            <p></p>

        </div>
    </body>
    <script>
        let btn = document.querySelector("#btn")
        let sideNav = document.querySelector("#side-bar")
        let navItem = document.querySelector("#nav-item")
        let mainContent = document.querySelector("#main-content")
        let home = document.querySelector("#side-nav-home")

        btn.onclick = function() {
            sideNav.classList.toggle("minimize");
            navItem.classList.toggle("minimize");
            btn.classList.toggle("clicked");
            mainContent.classList.toggle("expand");
        }

        
    </script>
</html>
