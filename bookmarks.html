<!DOCTYPE html>
<html>
    <head>
        <title>
            Freddyt - The horhor of the internet
        </title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Reddit+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
        <link rel="stylesheet" type="text/css" href="index.css">
    </head>

    <body>
        <header>
            <!--Show logo, doubles as link to the home page-->
            <div>
                <h1 id="logo"><a href="index.html" id="logo">freddyt</a></h1>
            </div>

            <!--The search bar-->
            <div>
                <input type="search" placeholder="Find anything" name="search" id="search-bar">
            </div>

            <!--The register and log in buttons-->
            <div id="reg-login-group">
                <button id="reg">Register</button>
                <button id="log">Log In</button>
                <button id="settings-visitor"><i class='bx bx-dots-horizontal-rounded' id="settings-icon"></i></button>
            </div>

            <!--Mini profile displayed when logged in-->
            <div id="mini-profile">
                <button id="profile-clickable"><i class='bx bxs-user-circle' id="profile-icon"></i></button>
                <button id="settings-logged-in"><i class='bx bx-dots-horizontal-rounded' id="settings-icon"></i></button>
            </div>
        </header>

        <!--Side navigation bar-->
        <div class="side-nav" id="side-bar">
            <span class="nav-item" id="nav-item">
                <a href="index.html" style="text-decoration: none;"><button class="side-nav-buttons" id="home-btn"><i class='bx bxs-home' id="side-nav-icons"></i> Home</button></a>
                <div id="bookmarks-bar">
                    <a href="bookmarks.html" style="text-decoration: none;"><button class="side-nav-buttons" id="bookmarks-btn"><i class='bx bxs-bookmarks' id="side-nav-icons"></i> Bookmarks</button></a>
                </div>            
            </span>
        </div>
        <!--Menu button to close side navigation-->
        <i class="bx bx-menu" id="btn"></i>

        <!--Main content area-->
        <div id="main-content">
            <h2>Bookmarks!</h2>
        </div>

        <!--Log in and Register popups-->
        <span>
            <!--Log in pop up, class modal is the transparent black bg-->
            <div id="login-popup" class="modal">
                <!--Displays the box to hold log in inputs-->
                <form class="modal-content">
                    <!--Contains the close (x) for the log in-->
                    <div class="xcontainer">
                        <span onclick="document.getElementById('login-popup').style.display='none'" class="close">&times;</span>
                    </div>
                    <!--Separate box for the log in details-->
                    <div class="container">
                        <!--Displays big Log In-->
                        <h1 style="text-align:center; font-family: 'Reddit Sans', sans-serif;">Log In</h1>
                        <!--Input box for email or username-->
                        <div class="form-group">
                            <input type="text" placeholder="Email or username" name="uname" id="log-reg-info">
                            <label for="log-reg-info" id="pholder">Email or username</label>
                        </div>
                        <!--Input box for password-->
                        <div class="form-group">
                            <input type="password" placeholder="Password" name="psw" id="log-reg-info">
                            <label for="log-reg-info" id="pholder">Password</label>
                        </div>      
                        <!--Log in submit button-->
                        <button type="submit" id="reg-login-btn">Log In</button>
                        <!--Extra stuff below the log in-->
                        <p align="center" style="font-family: 'Reddit Sans', sans-serif;">
                            <input type="checkbox" style="margin:26px 10px;"> Remember me      
                            <a href="#" style="text-decoration:none; float:right; margin-right:34px; margin-top:26px;" id="pop-to-pop">Forgot Password?</a>
                            <!--Link to Register pop up if no account made yet-->
                            <p align="center" style="font-family: 'Reddit Sans', sans-serif;">New to Freddyt? <span onclick="document.getElementById('login-popup').style.display='none'; document.getElementById('register-popup').style.display='block';" id="pop-to-pop">Register</span></p>
                        </p>
                    </div>
                </form>
            </div>

            <!--Register pop up, class modal is the transparent black bg-->
            <div id="register-popup" class="modal">
                <!--Displays the box to hold register inputs-->
                <form class="modal-content">
                    <!--Contains the close (x) for the register-->
                    <div class="xcontainer">
                        <span onclick="document.getElementById('register-popup').style.display='none'" class="close">&times;</span>
                    </div>
                    <!--Separate box for the register details-->
                    <div class="container">
                        <!--Displays big Register-->
                        <h1 style="text-align:center; font-family: 'Reddit Sans', sans-serif;">Register</h1>
                        <!--Input box for email or username-->
                        <div class="form-group">
                            <input type="text" placeholder="Email or username" name="uname" id="log-reg-info">
                            <label for="log-reg-info" id="pholder">Email or username</label>
                        </div>
                        <!--Input box for password-->
                        <div class="form-group">
                            <input type="password" placeholder="Password" name="psw" id="log-reg-info">
                            <label for="log-reg-info" id="pholder">Password</label>
                        </div>    
                        <!--Input box for re-enter password-->
                        <div class="form-group">
                            <input type="password" placeholder="Re-enter Password" name="psw" id="log-reg-info">
                            <label for="log-reg-info" id="pholder">Re-enter Password</label>
                        </div>
                        <!--Register submit button-->
                        <button type="submit" id="reg-login-btn">Register</button>
                        <!--Link to Log in pop up if already have an account-->
                        <p align="center" style="font-family: 'Reddit Sans', sans-serif;">Already a freddytor? <span onclick="document.getElementById('login-popup').style.display='block'; document.getElementById('register-popup').style.display='none';" id="pop-to-pop">Log In</span></p>
                    </div>
                </form>
            </div>
        </span>

        <!--Create post button-->
        <div id="create-post-login">
            <button id="create-post-btn"><i class="bx bx-plus"></i></button>
        </div>
        
        
        <!--Connect to JS script for animations-->
        <script src="auth.js"></script>
        <script src="main.js"></script>

        <script>
            setupPopups();
            updateUserUI();
        </script>
    </body>
</html>
